<title>Ted's Charity Invitational 2026 – Live Leaderboard</title>
<style>
:root{--green:#1a4a1a;--gmid:#2d6a2d;--gold:#c9a227;--glite:#f0c040;--cream:#f5f0e8;--red:#c0392b;--gray:#666;--lite:#eee;--shadow:0 2px 8px rgba(0,0,0,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:var(--cream);color:#1a1a1a;}
/* HEADER */
.hdr{background:var(--green);color:#fff;text-align:center;padding:20px 16px;border-bottom:4px solid var(--gold);}
.hdr .ico{font-size:52px;margin-bottom:8px;}
.hdr h1{font-size:24px;font-weight:700;letter-spacing:.5px;}
.hdr p{font-size:13px;color:var(--glite);margin-top:4px;}
.live{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:1px;margin-top:10px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.rfsh{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px;}
/* TABS */
.tabs{display:flex;background:var(--gmid);justify-content:center;}
.tab{padding:12px 28px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;font-weight:700;border-bottom:3px solid transparent;}
.tab.on{color:var(--glite);border-bottom-color:var(--gold);}
/* CONTENT */
.content{max-width:820px;margin:0 auto;padding:16px;}
.view{display:none;}.view.on{display:block;}
/* LEADERBOARD */
.flight-block{margin-bottom:20px;}
.flight-hdr{padding:10px 16px;border-radius:10px 10px 0 0;font-weight:700;font-size:15px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.flight-hdr span{font-size:12px;opacity:.75;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 10px 10px;overflow:hidden;box-shadow:var(--shadow);}
th{background:#f0f0f0;padding:8px 10px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
th.c,td.c{text-align:center;}
td{padding:11px 10px;border-bottom:1px solid var(--lite);font-size:14px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.pos{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:12px;}
.p1{background:var(--gold);color:#fff;}.p2{background:#aaa;color:#fff;}.p3{background:#cd7f32;color:#fff;}.pn{background:var(--lite);color:var(--gray);}
.under{color:var(--red);font-weight:700;}.over{color:#333;}.even{color:var(--green);font-weight:700;}
.no-sc{color:#bbb;font-style:italic;}
.team-nm{font-weight:600;}
/* SPECIALS */
.sp-section{margin-top:4px;}
.sp-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px;padding-bottom:8px;border-bottom:2px solid var(--gold);}
.sp-subtitle{font-size:12px;color:var(--gray);margin-bottom:14px;}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.sp-card{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);border-top:4px solid var(--gold);}
.sp-card h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sp-row{font-size:13px;padding:6px 0;border-bottom:1px solid var(--lite);display:flex;justify-content:space-between;align-items:center;}
.sp-row:last-child{border-bottom:none;}
.sp-lbl{color:var(--gray);font-size:12px;}
.sp-win{font-weight:600;color:var(--green);text-align:right;max-width:60%;}
.sp-pend{color:#bbb;font-style:italic;}
.prize-badge{background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--gray);}
.empty .ico{font-size:52px;margin-bottom:12px;}
.empty h2{color:var(--green);font-size:18px;margin-bottom:8px;}
@media(max-width:600px){
  .sp-grid{grid-template-columns:1fr;}
  .hdr h1{font-size:19px;}
  th,td{padding:7px 7px;font-size:12px;}
  .tab{padding:11px 16px;font-size:12px;}
}
</style>
</head>

const GCC_TOTAL_PAR=71;
// ── Firebase (read-only public page) ─────────────────────────
const firebaseConfig={apiKey:"AIzaSyATkBOYK3_vFn_oGvpmtOMExXtxnsTRsSc",authDomain:"teds-charity-2026.firebaseapp.com",databaseURL:"https://teds-charity-2026-default-rtdb.firebaseio.com",projectId:"teds-charity-2026",storageBucket:"teds-charity-2026.firebasestorage.app",messagingSenderId:"270962403702",appId:"1:270962403702:web:d835e14d97dd32dd45b257"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const _scores={};
const _specials={};
function load(k,def=null){try{const v=localStorage.getItem('tci2026_'+k);return v!==null?JSON.parse(v):def;}catch(e){return def;}}
function getScore(tid,course){return _scores[tid+'_'+course]||null;}
function getFlights(){return load('flights',[
  {name:'Championship',color:'#1a3a1a',min:0,max:999},
  {name:'Flight 1',color:'#2d6a2d',min:0,max:999},
  {name:'Flight 2',color:'#c9a227',min:0,max:999},
  {name:'Flight 3',color:'#8b4513',min:0,max:999},
  {name:'Flight 4',color:'#1a4a6a',min:0,max:999},
  {name:'Flight 5',color:'#6a1a4a',min:0,max:999}
]);}
function getTeamFlight(tid){
  const flights=getFlights();
  const s=getScore(tid,'acc');
  const sat=s&&s.team.filter(x=>x!==null).length===18?s.team.reduce((a,b)=>a+b,0):null;
  if(sat===null)return -1;
  for(let i=0;i<flights.length;i++){if(sat>=flights[i].min&&sat<=flights[i].max)return i;}
  return flights.length-1;
}
function getTeamStats(tid){
  const acc=getScore(tid,'acc'),gcc=getScore(tid,'gcc');
  const accH=acc?acc.team.filter(x=>x!==null):[];
  const gccH=gcc?gcc.team.filter(x=>x!==null):[];
  const accFull=accH.length===18,gccFull=gccH.length===18;
  const accTotal=accFull?acc.team.reduce((a,b)=>a+b,0):null;
  const gccTotal=gccFull?gcc.team.reduce((a,b)=>a+b,0):null;
  const total=(accFull&&gccFull)?accTotal+gccTotal:null;
  return{accTotal,gccTotal,total,
    totalVsPar:total!==null?total-(ACC_TOTAL_PAR+GCC_TOTAL_PAR):null,
    accVsPar:accFull?accTotal-ACC_TOTAL_PAR:null,
    gccVsPar:gccFull?gccTotal-GCC_TOTAL_PAR:null,
    accFull,gccFull};
}
function fmtVsPar(v){if(v===null)return'–';if(v===0)return'<span class="even">E</span>';if(v<0)return'<span class="under">'+v+'</span>';return'<span class="over">+'+v+'</span>';}
function fmtScore(v){return v!==null?v:'–';}
function timeToMin(t){if(!t)return 0;const p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]);}
function minToTime(m){return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0');}

</script>
<script>
function switchTab(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  el.classList.add('on');
  const ctrl=document.getElementById('sp-controls');
  if(ctrl) ctrl.style.display=(v==='sp')?'block':'none';
  if(v==='sp') loadAndRenderSpecials();
}

function renderLB(){
  const flights=getFlights();
  const data=TEAMS.map(t=>({...t,s:getTeamStats(t.id),fi:getTeamFlight(t.id)}));
  let html='',any=false;

  flights.forEach((f,fi)=>{
    const inf=data.filter(t=>t.fi===fi);
    const scored=inf.filter(t=>t.s.total!==null).sort((a,b)=>a.s.total-b.s.total);
    const uns=inf.filter(t=>t.s.total===null).sort((a,b)=>a.name.localeCompare(b.name));
    const all=[...scored,...uns];
    if(!all.length) return;
    any=any||(scored.length>0);
    html+=`<div class="flight-block">
      <div class="flight-hdr" style="background:${f.color}">${f.name}<span>${scored.length} of ${all.length} scored</span></div>
      <table><thead><tr><th style="width:36px">#</th><th>Team</th><th class="c">vs Par</th><th class="c">R1</th><th class="c">R2</th><th class="c">Total</th></tr></thead><tbody>`;
    all.forEach((t,i)=>{
      const pc=i===0?'p1':i===1?'p2':i===2?'p3':'pn';
      const vp=t.s.total!==null?fmtVsPar(t.s.totalVsPar):'<span class="no-sc">–</span>';
      html+=`<tr><td class="c"><span class="pos ${t.s.total!==null?pc:'pn'}">${t.s.total!==null?i+1:'–'}</span></td>
        <td><span class="team-nm">${t.name}</span></td>
        <td class="c">${vp}</td>
        <td class="c">${fmtScore(t.s.accTotal)}</td>
        <td class="c">${fmtScore(t.s.gccTotal)}</td>
        <td class="c" style="font-weight:700">${fmtScore(t.s.total)}</td></tr>`;
    });
    html+='</tbody></table></div>';
  });

  if(!any) html='<div class="empty"><div class="ico">⛳</div><h2>Scoring In Progress</h2><p>Live results will appear here as scores are submitted.</p></div>';
  document.getElementById('v-lb').innerHTML=html;
}

function renderSpecials(){
  const day=(document.getElementById('sp-day-pub')||{value:'sat'}).value;
  const course=(document.getElementById('sp-course-pub')||{value:'acc'}).value;
  const key=day+'_'+course;
  const sp=_specials[key]||{};
  const par3=course==='acc'?ACC_PAR3:GCC_PAR3;
  const courseLabel=course==='acc'?'Anniston CC':'Gadsden CC';
  const dayLabel=day==='sat'?'Saturday Jul 11':'Sunday Jul 12';
  const fullLabel=courseLabel+' · '+dayLabel;
  let html='';

  html+=`<div class="sp-title">⭐ ${fullLabel}</div>`;
  html+='<div class="sp-subtitle">$250 cash prizes per category · independent each day</div>';
  html+='<div class="sp-grid">';

  // Skins
  const skins=[];
  for(let h=0;h<18;h++){
    const sk=sp['skin_'+h];
    if(sk&&sk.teamId){const tm=TEAMS.find(t=>t.id===sk.teamId);if(tm)skins.push({h:h+1,name:tm.name,score:sk.score});}
  }
  html+=`<div class="sp-card"><h3>🎰 Skins <span class="prize-badge">$250/hole</span></h3>`;
  if(skins.length){
    skins.forEach(s=>{html+=`<div class="sp-row"><span class="sp-lbl">Hole ${s.h}</span><span class="sp-win">${s.name}${s.score?' ('+s.score+')':''}</span></div>`;});
  } else { html+='<div class="sp-pend">No skins awarded yet</div>'; }
  html+='</div>';

  // CTP
  html+=`<div class="sp-card"><h3>🎯 Closest to Pin <span class="prize-badge">$250</span></h3>`;
  par3.forEach(h=>{
    const ctp=sp['ctp_'+h]||{};
    const tm=ctp.teamId?TEAMS.find(t=>t.id===ctp.teamId):null;
    html+=`<div class="sp-row"><span class="sp-lbl">Hole ${h} (Par 3)</span><span class="${tm?'sp-win':'sp-pend'}">${tm?tm.name:'Pending'}</span></div>`;
  });
  const lp=sp['lp_18']||{};
  const lpTm=lp.teamId?TEAMS.find(t=>t.id===lp.teamId):null;
  html+=`<div class="sp-row" style="margin-top:10px;border-top:1px solid var(--lite);padding-top:10px"><span class="sp-lbl">🏌️ Longest Putt H18</span><span class="${lpTm?'sp-win':'sp-pend'}">${lpTm?lpTm.name:'Pending'}</span></div>`;
  html+='</div>';

  html+='</div>'; // sp-grid
  document.getElementById('v-sp').innerHTML=html;
}

// Real-time listeners — update instantly when Firebase data changes
db.ref('scores').on('value', snap=>{
  const data=snap.val()||{};
  Object.keys(data).forEach(tid=>{
    ['acc','gcc'].forEach(course=>{
      if(data[tid][course]) _scores[tid+'_'+course]=data[tid][course];
    });
  });
  renderLB();
});

// Specials update when tab is viewed
function loadAndRenderSpecials(){
  const day=(document.getElementById('sp-day-pub')||{value:'sat'}).value;
  const course=(document.getElementById('sp-course-pub')||{value:'acc'}).value;
  const key=day+'_'+course;
  db.ref('specials/'+key).once('value').then(snap=>{
    _specials[key]=snap.val()||{};
    renderSpecials();
  });
}

// Initial load
loadAndRenderSpecials();

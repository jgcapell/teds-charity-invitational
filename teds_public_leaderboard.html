<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Ted's Charity Invitational 2026 – Live Leaderboard</title>
<style>
:root{--green:#1a4a1a;--gmid:#2d6a2d;--gold:#c9a227;--glite:#f0c040;--cream:#f5f0e8;--red:#c0392b;--gray:#666;--lite:#eee;--shadow:0 2px 8px rgba(0,0,0,.12);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Georgia,serif;background:var(--cream);color:#1a1a1a;}
/* HEADER */
.hdr{background:var(--green);color:#fff;text-align:center;padding:20px 16px;border-bottom:4px solid var(--gold);}
.hdr .ico{font-size:52px;margin-bottom:8px;}
.hdr h1{font-size:24px;font-weight:700;letter-spacing:.5px;}
.hdr p{font-size:13px;color:var(--glite);margin-top:4px;}
.live{display:inline-block;background:var(--red);color:#fff;font-size:11px;font-weight:700;padding:3px 12px;border-radius:20px;letter-spacing:1px;margin-top:10px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
.rfsh{font-size:11px;color:rgba(255,255,255,.45);margin-top:6px;}
/* TABS */
.tabs{display:flex;background:var(--gmid);justify-content:center;}
.tab{padding:12px 28px;color:rgba(255,255,255,.65);cursor:pointer;font-size:13px;font-weight:700;border-bottom:3px solid transparent;}
.tab.on{color:var(--glite);border-bottom-color:var(--gold);}
/* CONTENT */
.content{max-width:820px;margin:0 auto;padding:16px;}
.view{display:none;}.view.on{display:block;}
/* LEADERBOARD */
.flight-block{margin-bottom:20px;}
.flight-hdr{padding:10px 16px;border-radius:10px 10px 0 0;font-weight:700;font-size:15px;color:#fff;display:flex;justify-content:space-between;align-items:center;}
.flight-hdr span{font-size:12px;opacity:.75;}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 10px 10px;overflow:hidden;box-shadow:var(--shadow);}
th{background:#f0f0f0;padding:8px 10px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;}
th.c,td.c{text-align:center;}
td{padding:11px 10px;border-bottom:1px solid var(--lite);font-size:14px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.pos{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:12px;}
.p1{background:var(--gold);color:#fff;}.p2{background:#aaa;color:#fff;}.p3{background:#cd7f32;color:#fff;}.pn{background:var(--lite);color:var(--gray);}
.under{color:var(--red);font-weight:700;}.over{color:#333;}.even{color:var(--green);font-weight:700;}
.no-sc{color:#bbb;font-style:italic;}
.team-nm{font-weight:600;}
/* SPECIALS */
.sp-section{margin-top:4px;}
.sp-title{font-size:20px;font-weight:700;color:var(--green);margin-bottom:4px;padding-bottom:8px;border-bottom:2px solid var(--gold);}
.sp-subtitle{font-size:12px;color:var(--gray);margin-bottom:14px;}
.sp-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px;}
.sp-card{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--shadow);border-top:4px solid var(--gold);}
.sp-card h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sp-row{font-size:13px;padding:6px 0;border-bottom:1px solid var(--lite);display:flex;justify-content:space-between;align-items:center;}
.sp-row:last-child{border-bottom:none;}
.sp-lbl{color:var(--gray);font-size:12px;}
.sp-win{font-weight:600;color:var(--green);text-align:right;max-width:60%;}
.sp-pend{color:#bbb;font-style:italic;}
.prize-badge{background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:6px;}
/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--gray);}
.tt-section{margin-bottom:20px;}
.tt-hdr{background:var(--green);color:white;padding:9px 14px;border-radius:8px 8px 0 0;font-weight:700;font-size:14px;}
.tt-table{width:100%;border-collapse:collapse;background:white;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:var(--shadow);}
.tt-table th{background:#f0f0f0;padding:7px 10px;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;text-align:left;}
.tt-table td{padding:9px 10px;border-bottom:1px solid var(--lite);font-size:13px;}
.tt-table tr:last-child td{border-bottom:none;}
.tee-badge-pub{background:var(--green);color:white;padding:3px 8px;border-radius:4px;font-size:12px;font-weight:700;}
.empty .ico{font-size:52px;margin-bottom:12px;}
.empty h2{color:var(--green);font-size:18px;margin-bottom:8px;}
@media(max-width:600px){
  .sp-grid{grid-template-columns:1fr;}
  .hdr h1{font-size:19px;}
  th,td{padding:7px 7px;font-size:12px;}
  .tab{padding:11px 16px;font-size:12px;}
}
</style>
</head>

    eligible.forEach(t=>{
      const satC = t.acc_tee_time ? 'acc' : 'gcc';
      const sunC = satC==='acc'?'gcc':'acc';
      const scoreCourse = day==='sat' ? satC : sunC;
      const s = getScore(t.id, scoreCourse);
      if(!s||s.dnf) return;
      const v = s.team[h];
      if(v===null||v===undefined) return;
      if(low===null||v<low){ low=v; winners=[t]; tied=false; }
      else if(v===low){ winners.push(t); tied=true; }
    });
    skins.push({ hole:h+1, score:low, winner:(!tied&&winners.length===1)?winners[0]:null, tied });
  }
  return skins;
}

function switchTab(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.getElementById('v-'+v).classList.add('on');
  el.classList.add('on');
  if(v==='sp') loadAndRenderSpecials();
  if(v==='tt') loadAndRenderTT();
}

function loadAndRenderTT(){
  // Check Firebase for published Sunday tee times
  Promise.all([
    db.ref('published_tt/sun_acc').once('value'),
    db.ref('published_tt/sun_gcc').once('value')
  ]).then(([accSnap, gccSnap])=>{
    renderTTView(accSnap.val(), gccSnap.val());
  });
}

function renderTTView(sunAcc, sunGcc){
  let html='';
  // Saturday ACC
  html+=buildSatTT('acc');
  // Saturday GCC
  html+=buildSatTT('gcc');
  // Sunday — only show if published
  if(sunAcc||sunGcc){
    html+=`<div style="background:var(--green);color:white;padding:10px 16px;border-radius:10px;font-weight:700;font-size:15px;margin-bottom:12px;margin-top:8px">📋 Sunday · July 12, 2026</div>`;
    if(sunAcc) html+=buildSunTT(sunAcc,'Anniston CC');
    if(sunGcc) html+=buildSunTT(sunGcc,'Gadsden CC');
  } else {
    html+=`<div style="background:#f5f5f5;border-radius:10px;padding:20px;text-align:center;color:var(--gray);margin-top:8px">
      <div style="font-size:24px;margin-bottom:8px">⏳</div>
      <div style="font-weight:700">Sunday tee times not yet published</div>
      <div style="font-size:13px;margin-top:4px">Check back after Saturday's round</div>
    </div>`;
  }
  document.getElementById('v-tt').innerHTML=html;
}

function buildSatTT(course){
  const label=course==='acc'?'Anniston CC (Low Ball · Par 70)':'Gadsden CC (Scamble · Par 71)';
  const rows=SAT_PUB[course];
  let h=`<div style="background:var(--green);color:white;padding:10px 16px;border-radius:10px;font-weight:700;font-size:15px;margin-bottom:12px">📋 Saturday · July 11, 2026 · ${label}</div>`;
  h+='<div class="tt-section"><table class="tt-table"><thead><tr><th>Tee Time</th><th>Team 1</th><th>Team 2</th></tr></thead><tbody>';
  rows.forEach(r=>{
    h+=`<tr><td><span class="tee-badge-pub">${r[0]}</span></td><td>${r[1]}</td><td>${r[2]}</td></tr>`;
  });
  h+='</tbody></table></div>';
  return h;
}

function buildSunTT(data, label){
  let h=`<div class="tt-section"><div class="tt-hdr">${label}</div><table class="tt-table"><thead><tr><th>Tee Time</th><th>Team</th><th>Flight</th><th>Sat Score</th></tr></thead><tbody>`;
  data.pairs.forEach(p=>{
    const s1=p.team1.score!==null?p.team1.score:'–';
    const s2=p.team2?(p.team2.score!==null?p.team2.score:'–'):'';
    h+=`<tr style="border-top:2px solid var(--green)"><td rowspan="2"><span class="tee-badge-pub">${p.time}</span></td>
      <td style="font-weight:600">${p.team1.name}</td>
      <td style="font-size:11px;color:var(--gray)">${p.team1.flight}</td>
      <td>${s1}</td></tr>`;
    if(p.team2){
      h+=`<tr><td style="font-weight:600">${p.team2.name}</td>
        <td style="font-size:11px;color:var(--gray)">${p.team2.flight}</td>
        <td>${s2}</td></tr>`;
    }
  });
  h+='</tbody></table></div>';
  return h;
}

  function sortKey(t){
    if(t.s.anyDNF) return 88888; // DNF sorts below scores, above unscored
    if(t.s.total!==null&&t.s.total!=='DNF') return t.s.total;
    if(t.s.satFull) return t.s.satTotal+10000;
    if(t.s.satTotal!==null&&t.s.satTotal!=='DNF') return t.s.satTotal+20000;
    return 99999;
  }

  function teamRow(t,pos){
    const isDNF=t.s.anyDNF;
    const hasScore=t.s.satTotal!==null||isDNF;
    const pc=pos===1?'p1':pos===2?'p2':pos===3?'p3':'pn';
    const vpStr=isDNF?'<span style="color:#c0392b;font-weight:700">DNF</span>'
      :(t.s.total!==null&&t.s.total!=='DNF'?fmtVsPar(t.s.totalVsPar)
      :(t.s.satTotal!==null&&t.s.satTotal!=='DNF'?fmtVsPar(t.s.satVsPar)+'<span style="font-size:10px;color:#999"> R1</span>'
      :'<span class="no-sc">–</span>'));
    const partial=t.s.satTotal!==null&&t.s.satTotal!=='DNF'&&!t.s.satFull
      ?'<span style="font-size:10px;color:#e65100"> ('+t.s.satHolesPlayed+')</span>':''
    const r1=isDNF&&t.s.satDNF?'<span style="color:#c0392b;font-weight:700">DNF</span>'
      :(t.s.satTotal!==null&&t.s.satTotal!=='DNF'?t.s.satTotal+''+partial:'–');
    const r2=isDNF&&t.s.sunDNF?'<span style="color:#c0392b;font-weight:700">DNF</span>'
      :(t.s.sunTotal!==null&&t.s.sunTotal!=='DNF'?t.s.sunTotal:'–');
    const tot=isDNF?'<span style="color:#c0392b;font-weight:700">DNF</span>'
      :(t.s.total!==null&&t.s.total!=='DNF'?t.s.total:'–');
    return `<tr ${isDNF?'style="opacity:0.7"':''}>
      <td class="c"><span class="pos ${hasScore&&!isDNF?pc:'pn'}">${hasScore&&!isDNF?pos:isDNF?'⛔':'–'}</span></td>
      <td><span class="team-nm">${t.name}</span></td>
      <td class="c">${vpStr}</td>
      <td class="c">${r1}</td>
      <td class="c">${r2}</td>
      <td class="c" style="font-weight:700">${tot}</td></tr>`;
  }

  if(!flightsConfigured){
    const sorted=data.slice().sort((a,b)=>sortKey(a)-sortKey(b));
    const scoredCount=sorted.filter(t=>t.s.satTotal!==null).length;
    html+='<div class="flight-hdr" style="background:#1a4a1a">Overall Standings <span>'+scoredCount+' of '+data.length+' scored</span></div>';
    html+='<table><thead><tr><th style="width:36px">#</th><th>Team</th><th class="c">vs Par</th><th class="c">R1 (Sat)</th><th class="c">R2 (Sun)</th><th class="c">Total</th></tr></thead><tbody>';
    let pos=1;
    sorted.forEach(t=>{
      html+=teamRow(t,pos);
      if(t.s.satTotal!==null) pos++;
    });
    html+='</tbody></table>';
  } else {
    // GCC-Saturday flights first (Champ, F1, F2), then ACC-Saturday (F3, F4, F5)
    flights.forEach((f,fi)=>{
      const inF=data.filter(t=>t.fi===fi).sort((a,b)=>sortKey(a)-sortKey(b));
      if(!inF.length) return;
      const scoredF=inF.filter(t=>t.s.satFull||t.s.total!==null).length;
      html+=`<div class="flight-block">
        <div class="flight-hdr" style="background:${f.color}">${f.name}<span>${scoredF} of ${inF.length} scored</span></div>
        <table><thead><tr><th style="width:36px">#</th><th>Team</th><th class="c">vs Par</th><th class="c">R1 (Sat)</th><th class="c">R2 (Sun)</th><th class="c">Total</th></tr></thead><tbody>`;
      let pos=1;
      inF.forEach(t=>{html+=teamRow(t,pos);if(t.s.satTotal!==null)pos++;});
      html+='</tbody></table></div>';
    });
    // Teams not yet assigned
    const unassigned=data.filter(t=>t.fi===-1&&t.s.satTotal!==null).sort((a,b)=>sortKey(a)-sortKey(b));
    if(unassigned.length){
      html+='<div class="flight-hdr" style="background:#888">Unassigned <span>'+unassigned.length+'</span></div>';
      html+='<table><thead><tr><th>#</th><th>Team</th><th class="c">vs Par</th><th class="c">R1 (Sat)</th><th class="c">R2 (Sun)</th><th class="c">Total</th></tr></thead><tbody>';
      let pos=1;
      unassigned.forEach(t=>{html+=teamRow(t,pos++);});
      html+='</tbody></table>';
    }
  }
  document.getElementById('v-lb').innerHTML=html;
}

function renderSpecials(){
  function publishedBlock(key, courseLabel, dayLabel){
    const data=_specials[key]; // null if not yet published
    let html=`<div style="margin-bottom:20px">`;
    html+=`<div class="sp-title" style="font-size:15px">⭐ ${courseLabel} · ${dayLabel}</div>`;
    html+=`<div class="sp-subtitle">$250 cash prizes per category</div>`;

    if(!data){
      html+=`<div style="background:#f5f5f5;border-radius:10px;padding:16px;text-align:center;color:var(--gray)">
        <div style="font-size:20px;margin-bottom:6px">⏳</div>
        <div style="font-weight:700;font-size:13px">Results not yet published</div>
      </div>`;
      html+='</div>';
      return html;
    }

    html+='<div class="sp-grid">';

    // Skins
    html+=`<div class="sp-card"><h3>🎰 Skins <span class="prize-badge">$250/hole</span></h3>`;
    if(data.skins&&data.skins.length){
      data.skins.forEach(s=>{
        html+=`<div class="sp-row"><span class="sp-lbl">Hole ${s.hole} (${s.score})</span><span class="sp-win">${s.teamName}</span></div>`;
      });
    } else {
      html+='<div class="sp-pend">No skins awarded</div>';
    }
    html+='</div>';

    // CTP + LP
    const par3=key.includes('acc')?ACC_PAR3:GCC_PAR3;
    html+=`<div class="sp-card"><h3>🎯 Closest to Pin <span class="prize-badge">$250</span></h3>`;
    if(data.ctp&&data.ctp.length){
      data.ctp.forEach(c=>{
        html+=`<div class="sp-row"><span class="sp-lbl">Hole ${c.hole} (Par 3)</span><span class="${c.teamName?'sp-win':'sp-pend'}">${c.teamName||'Pending'}</span></div>`;
      });
    }
    const lpName=data.lp&&data.lp.teamName?data.lp.teamName:null;
    html+=`<div class="sp-row" style="margin-top:8px;border-top:1px solid var(--lite);padding-top:8px">
      <span class="sp-lbl">🏌️ Longest Putt H18</span>
      <span class="${lpName?'sp-win':'sp-pend'}">${lpName||'Pending'}</span></div>`;
    html+='</div>';
    html+='</div>'; // sp-grid
    html+='</div>';
    return html;
  }

  let html='';
  html+=`<div style="background:var(--green);color:white;padding:10px 16px;border-radius:10px;font-weight:700;font-size:15px;margin-bottom:12px">⛳ Saturday · July 11, 2026</div>`;
  html+=publishedBlock('sat_acc','Anniston CC','Saturday Jul 11');
  html+=publishedBlock('sat_gcc','Gadsden CC','Saturday Jul 11');
  html+=`<div style="background:var(--green);color:white;padding:10px 16px;border-radius:10px;font-weight:700;font-size:15px;margin-bottom:12px;margin-top:8px">⛳ Sunday · July 12, 2026</div>`;
  html+=publishedBlock('sun_acc','Anniston CC','Sunday Jul 12');
  html+=publishedBlock('sun_gcc','Gadsden CC','Sunday Jul 12');

  document.getElementById('v-sp').innerHTML=html;
}

// Real-time listeners — update instantly when Firebase data changes
// Load flights from Firebase (set by admin in scorer app)
db.ref('flights').on('value', snap=>{
  const f=snap.val();
  if(f&&Array.isArray(f)) _flights=f;
});

// Real-time score listener — updates without page reload, preserves scroll position
db.ref('scores').on('value', snap=>{
  const data=snap.val()||{};
  Object.keys(data).forEach(tid=>{
    ['acc','gcc'].forEach(course=>{
      if(data[tid][course]) _scores[tid+'_'+course]=data[tid][course];
    });
  });
  renderLB();
  // Update last-updated timestamp
  const el=document.getElementById('last-update');
  if(el){
    const now=new Date();
    el.textContent='Updated '+now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  }
});

// Specials update when tab is viewed
function loadAndRenderSpecials(){
  // Load from published_specials — only shows what admin has explicitly published
  const combos=['sat_acc','sat_gcc','sun_acc','sun_gcc'];
  const promises=combos.map(key=>
    db.ref('published_specials/'+key).once('value').then(snap=>{
      _specials[key]=snap.val()||null; // null = not yet published
    })
  );
  Promise.all(promises).then(()=>renderSpecials());
}

// Also listen for real-time specials updates when admin publishes
db.ref('published_specials').on('value',snap=>{
  const data=snap.val()||{};
  ['sat_acc','sat_gcc','sun_acc','sun_gcc'].forEach(key=>{
    _specials[key]=data[key]||null;
  });
  // Only re-render if specials tab is visible
  if(document.getElementById('v-sp').classList.contains('on')) renderSpecials();
});

// Initial load
loadAndRenderSpecials();
</script>
